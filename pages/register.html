<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register • ISOP+</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    :root {
      --glass-bg: rgba(255,255,255,0.25);
      --glass-blur: blur(10px);
      --gradient-main: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; padding:0; min-height:100vh; background: var(--gradient-main); }
    .auth-container { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:2rem; }
    .auth-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); border-radius:24px; border:1px solid rgba(255,255,255,0.18); box-shadow:0 20px 40px rgba(0,0,0,0.1); padding:3rem; max-width:480px; width:100%; }
    .auth-header { text-align:center; margin-bottom:2.5rem; }
    .auth-title { font-size:2.8rem; background:linear-gradient(135deg, white, #f0f0f0); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin:0 0 0.5rem 0; font-weight:700; }
    .auth-lead { color:rgba(255,255,255,0.9); margin:0; font-size:1.1rem; }
    .tab-nav { display:flex; background:rgba(255,255,255,0.1); border-radius:16px; margin-bottom:2rem; overflow:hidden; }
    .tab-btn { flex:1; padding:1rem 0; border:none; background:none; color:rgba(255,255,255,0.8); font-weight:500; cursor:pointer; transition:all 0.3s; }
    .tab-btn.active { background:rgba(255,255,255,0.2); color:white; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .form-group { margin-bottom:1.5rem; }
    .form-label { display:block; margin-bottom:0.5rem; color:rgba(255,255,255,0.95); font-weight:500; }
    .form-input, .form-select { width:100%; padding:1rem 1.2rem; border:1px solid rgba(255,255,255,0.2); border-radius:12px; background:rgba(255,255,255,0.1); backdrop-filter:var(--glass-blur); color:white; font-size:1rem; transition:all 0.3s; box-sizing:border-box; }
    .form-select option { background:#2d2250; color:#fff; }
    .form-input::placeholder { color:rgba(255,255,255,0.6); }
    .form-input:focus, .form-select:focus { outline:none; border-color:rgba(255,255,255,0.4); background:rgba(255,255,255,0.15); box-shadow:0 0 0 3px rgba(255,255,255,0.1); }
    .register-btn { width:100%; padding:1.1rem; border-radius:16px; border:none; font-size:1.1rem; font-weight:600; cursor:pointer; transition:all 0.3s; background:linear-gradient(135deg, #10b981, #059669); color:white; box-shadow:0 10px 30px rgba(16,185,129,0.3); }
    .register-btn:hover { transform:translateY(-1px); box-shadow:0 15px 40px rgba(16,185,129,0.4); }
    .demo-creds { text-align:center; margin-top:1.5rem; padding-top:1.5rem; border-top:1px solid rgba(255,255,255,0.1); }
    .demo-list { font-size:0.95rem; line-height:1.6; color:rgba(255,255,255,0.8); }
    .toggle-link { color:rgba(255,255,255,0.9); text-decoration:none; font-weight:500; }
    .toggle-link:hover { text-decoration:underline; }
    .quick-login { background:linear-gradient(135deg, #3b82f6, #2563eb); color:white; padding:1rem; border-radius:12px; text-align:center; margin-bottom:1rem; text-decoration:none; font-weight:600; display:block; }
    .quick-login:hover { transform:translateY(-1px); box-shadow:0 10px 30px rgba(59,130,246,0.4); }
    @media (max-width: 600px) { .auth-card { padding:2rem 1.5rem; margin:1rem; } .auth-title { font-size:2.2rem; } }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">Join ISOP+</h1>
        <p class="auth-lead">Create account in 30 seconds</p>
        <p style="margin:0.6rem 0 0;font-size:0.78rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.55);">DISABILITY IS NOT INABILITY</p>
      </div>

      <!-- Quick Login Link -->
      <a href="login.html" class="quick-login">← Quick Demo Login</a>

      <!-- Register Form -->
      <form class="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label" for="regName">Full Name</label>
          <input class="form-input" type="text" id="regName" name="fullName" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label class="form-label" for="regEmail">Email</label>
          <input class="form-input" type="email" id="regEmail" name="email" required placeholder="john@example.com">
        </div>
        <div class="form-group">
          <label class="form-label" for="regRole">Role</label>
          <select class="form-select" id="regRole" name="role" required>
            <option value="">Select role</option>
            <option value="student">👩‍🎓 Student/Learner</option>
            <option value="mentor">👨‍🏫 Mentor</option>
            <option value="admin">⚙️ Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="regDisability">Disability type <span style="opacity:0.6;font-size:0.85em;font-weight:400;">(optional)</span></label>
          <select class="form-select" id="regDisability" name="disability">
            <option value="">Prefer not to say / Not applicable</option>
            <option value="visual">Visual Impairment</option>
            <option value="hearing">Hearing Impairment</option>
            <option value="physical">Physical / Motor Disability</option>
            <option value="cognitive">Cognitive / Learning Disability</option>
            <option value="speech">Speech Impairment</option>
            <option value="mental_health">Mental Health Condition</option>
            <option value="multiple">Multiple Disabilities</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group" id="disabilitySpecifyGroup" style="display:none;">
          <label class="form-label" for="regDisabilityOther">Please specify</label>
          <input class="form-input" type="text" id="regDisabilityOther" name="disabilityOther" placeholder="Describe your disability (optional)">
        </div>
        <div class="form-group">
          <label class="form-label" for="regPassword">Password</label>
          <input class="form-input" type="password" id="regPassword" name="password" required minlength="6" placeholder="6+ characters">
        </div>
        <div class="form-group">
          <label class="form-label" for="regConfirmPassword">Confirm Password</label>
          <input class="form-input" type="password" id="regConfirmPassword" name="confirmPassword" required placeholder="Repeat password">
        </div>
        <button type="submit" class="register-btn">Create Account</button>
      </form>

      <div class="demo-creds">
        <p>Already registered? Use demo:</p>
        <div class="demo-list">
          student@isop.com / student123 → Student Dashboard<br>
          mentor@isop.com / mentor123 → Mentor Tools<br>
          admin@isop.com / admin123 → Admin Panel
        </div>
        <a href="login.html" class="toggle-link" style="display:block; margin-top:1rem;">← Back to Login</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/localdb.js"></script>
  <script src="../assets/js/supabase.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    const DASHBOARD_MAP = { student: 'student-dashboard.html', mentor: 'mentor-tools.html', admin: 'admin.html' };

    document.getElementById('regDisability').addEventListener('change', function() {
      document.getElementById('disabilitySpecifyGroup').style.display = this.value === 'other' ? 'block' : 'none';
    });

    function showMsg(msg, type) {
      let el = document.getElementById('reg-msg');
      if (!el) {
        el = document.createElement('div');
        el.id = 'reg-msg';
        el.style.cssText = 'padding:0.9rem 1rem;border-radius:12px;margin-bottom:1rem;font-size:0.9rem;';
        document.querySelector('.auth-card').prepend(el);
      }
      const isError = type === 'error';
      el.style.background = isError ? '#fee2e2' : '#dcfce7';
      el.style.color      = isError ? '#dc2626' : '#15803d';
      el.style.border     = isError ? '1px solid #fecaca' : '1px solid #bbf7d0';
      el.innerHTML = msg;
      el.style.display = 'block';
      if (isError) setTimeout(() => { el.style.display = 'none'; }, 6000);
    }

    async function handleRegister(e) {
      e.preventDefault();

      const name            = document.getElementById('regName').value.trim();
      const email           = document.getElementById('regEmail').value.trim().toLowerCase();
      const role            = document.getElementById('regRole').value;
      const disability      = document.getElementById('regDisability').value;
      const disabilityOther = document.getElementById('regDisabilityOther').value.trim();
      const disabilityFinal = disability === 'other' && disabilityOther ? disabilityOther : disability;
      const password        = document.getElementById('regPassword').value;
      const confirmPassword = document.getElementById('regConfirmPassword').value;
      const btn             = document.querySelector('.register-btn');

      // Validation
      if (!name || !email || !role || !password) { showMsg('Please fill in all fields.', 'error'); return; }
      if (password.length < 6)                   { showMsg('Password must be at least 6 characters.', 'error'); return; }
      if (password !== confirmPassword)           { showMsg('Passwords do not match.', 'error'); return; }

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      // Check localDB duplicate
      await window.localDB.ready;
      const existing = await window.localDB.findUserByEmail(email);
      if (existing) {
        showMsg('Email already registered. <a href="login.html" style="color:inherit;font-weight:700;">Login here →</a>', 'error');
        btn.disabled = false; btn.textContent = 'Create Account';
        return;
      }

      try {
        // ── Path A: Supabase available ────────────────────────────────
        if (window.supabaseClient) {
          const { data, error } = await window.supabaseClient.auth.signUp({ email, password });

          if (error) throw error;

          const userId = data.user?.id || email.replace(/[@.]/g, '_');

          // Save role + name to profiles table
          await window.supabaseClient.from('profiles').upsert({ id: userId, name, role, email, disability: disabilityFinal });

          // Always save to localDB too (offline fallback)
          await window.localDB.createUser({ id: userId, name, email, password, role, disability: disabilityFinal });

          // Email confirmation required?
          const needsConfirm = data.user && !data.session;
          if (needsConfirm) {
            showMsg(
              '✅ Account created! <strong>Check your email</strong> for a confirmation link, then come back to <a href="login.html" style="color:inherit;font-weight:700;">login</a>.',
              'success'
            );
            btn.disabled = false; btn.textContent = 'Create Account';
            return;
          }

          // No confirmation required — log straight in
          window.localDB.setCurrentUser({ id: userId, name, email, role });
          window.location.href = DASHBOARD_MAP[role] || 'index.html';
          return;
        }

        // ── Path B: Local-only (no Supabase) ─────────────────────────
        const localId = email.replace(/[@.]/g, '_');
        await window.localDB.createUser({ id: localId, name, email, password, role, disability: disabilityFinal });
        window.localDB.setCurrentUser({ id: localId, name, email, role });
        window.location.href = DASHBOARD_MAP[role] || 'index.html';

      } catch (err) {
        showMsg('Registration failed: ' + (err.message || 'Unknown error'), 'error');
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
