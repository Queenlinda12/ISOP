<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentor Tools • ISOP+</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.min.css">
</head>
<body>
  <!-- Header same as dashboard -->
  <header class="site-header" role="banner">
    <div class="container header-inner">
      <a class="brand" href="../index.html">
        <span class="brand__logo" aria-hidden="true">🌟</span>
        <span class="brand__name">ISOP+</span>
      </a>
      <div id="header-actions" class="header-actions">
        <a class="btn btn--secondary" href="dashboard.html">Dashboard</a>
        <button class="btn btn--outline" onclick="logout()">Logout</button>
      </div>
    </div>
  </header>

  <main id="main" class="site-main" style="padding: 2rem 0;">
    <div class="container">
      <div class="topbar" style="margin-bottom: 2rem;">
        <h1 style="margin: 0;">Mentor Tools</h1>
        <p style="color: #94a3b8; margin: 0.25rem 0 0;">Schedule meetings, review feedback, manage resources</p>
      </div>

      <!-- Tabs -->
      <div style="background: rgba(255,255,255,0.05); border-radius: 16px; padding: 1rem; margin-bottom: 2rem; border: 1px solid rgba(255,255,255,0.1);">
        <div style="display: flex; gap: 0.5rem; overflow-x: auto; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; margin-bottom: 1rem;">
          <button class="tab-btn active" data-tab="schedule">📅 Schedule</button>
          <button class="tab-btn" data-tab="reviews">💬 Reviews</button>
          <button class="tab-btn" data-tab="mentees">👥 Mentees</button>
          <button class="tab-btn" data-tab="resources">📚 Resources</button>
        </div>

        <!-- Schedule Tab -->
        <div id="schedule-tab" class="tab-content active">
          <h2>Schedule Meeting</h2>
          <div style="display: grid; gap: 1rem; max-width: 500px;">
            <input id="tool-mentee-id" placeholder="Mentee email/ID" style="padding: 0.75rem; border-radius: 8px; border: 1px solid #475569;">
            <input id="tool-meeting-date" type="datetime-local" style="padding: 0.75rem; border-radius: 8px; border: 1px solid #475569;">
            <textarea id="tool-meeting-notes" placeholder="Notes (optional)" rows="3" style="padding: 0.75rem; border-radius: 8px; border: 1px solid #475569; resize: vertical;"></textarea>
            <button id="tool-schedule-btn" class="btn btn--primary" style="width: 100%; padding: 0.75rem;">Schedule Meeting</button>
          </div>
        </div>

        <!-- Reviews Tab -->
        <div id="reviews-tab" class="tab-content">
          <h2>Your Reviews & Feedback</h2>
          <div id="reviews-list" style="display: grid; gap: 1rem; max-height: 400px; overflow-y: auto;"></div>
        </div>

        <!-- Mentees Tab -->
        <div id="mentees-tab" class="tab-content">
          <h2>Assigned Mentees</h2>
          <div id="mentees-list" style="display: grid; gap: 1rem;"></div>
        </div>

        <!-- Resources Tab -->
        <div id="resources-tab" class="tab-content">
          <h2>Upload Resource</h2>
          <div style="display: grid; gap: 1rem; max-width: 500px;">
            <input id="tool-res-title" placeholder="Title" style="padding: 0.75rem; border-radius: 8px; border: 1px solid #475569;">
            <textarea id="tool-res-desc" placeholder="Description" rows="2" style="padding: 0.75rem; border-radius: 8px; border: 1px solid #475569;"></textarea>
            <input type="file" id="tool-res-file" accept=".pdf,.docx,.pptx,image/*">
            <button id="tool-upload-res" class="btn btn--primary" style="width: 100%; padding: 0.75rem;">Upload</button>
          </div>
          <h3 style="margin-top: 2rem;">Your Resources</h3>
          <div id="resources-list" style="display: grid; gap: 1rem;"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="../assets/js/supabase.js"></script>
  <script src="../assets/js/backend.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    // Mentor tools script
    const auth = JSON.parse(localStorage.getItem('isop_auth'));
    if (!auth || auth.role !== 'mentor') {
      window.location.href = 'dashboard.html';
    }

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
        loadTabData(btn.dataset.tab);
      });
    });

    async function loadTabData(tab) {
      const mockId = auth.email.replace(/[@.]/g, '_');
      try {
        if (tab === 'reviews') {
          const reviews = await getMyReviews(mockId);
          document.getElementById('reviews-list').innerHTML = reviews.map(r => `
            <div style="padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 12px; border-left: 4px solid ${r.rating > 3 ? '#4ade80' : '#ff6b6b'};">
              <strong>${r.from_id}</strong> (${r.rating}/5)
              <p>${r.comment}</p>
              <small>${new Date(r.created_at).toLocaleDateString()}</small>
            </div>
          `).join('') || '<p>No reviews yet. Great work!</p>';
        } else if (tab === 'mentees') {
          const mentees = await getMyMentees(mockId);
          document.getElementById('mentees-list').innerHTML = mentees.map(m => `
            <div style="padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 12px;">
              <h4>${m.mentee?.name || m.mentee}</h4>
              <p>${new Date(m.datetime).toLocaleString()}</p>
              <p>Status: ${m.status}</p>
            </div>
          `).join('') || '<p>No mentees scheduled.</p>';
        } else if (tab === 'resources') {
          // Load resources list here if query added
        }
      } catch (e) {
        console.warn('Data load failed:', e);
      }
    }

    // Event listeners
    document.getElementById('tool-schedule-btn').addEventListener('click', async () => {
      const menteeId = document.getElementById('tool-mentee-id').value;
      const datetime = document.getElementById('tool-meeting-date').value;
      const notes = document.getElementById('tool-meeting-notes').value;
      if (!menteeId || !datetime) return alert('Mentee and date required');
      try {
        const mockId = auth.email.replace(/[@.]/g, '_');
        await scheduleMeeting(mockId, menteeId, new Date(datetime), notes);
        alert('Meeting scheduled!');
        loadTabData('mentees');
      } catch (e) {
        alert('Error: ' + e.message);
      }
    });

    document.getElementById('tool-upload-res').addEventListener('click', async () => {
      const title = document.getElementById('tool-res-title').value;
      const desc = document.getElementById('tool-res-desc').value;
      const file = document.getElementById('tool-res-file').files[0];
      if (!title || !file) return alert('Title and file required');
      try {
        const mockId = auth.email.replace(/[@.]/g, '_');
        await uploadResource(mockId, title, desc, file);
        alert('Resource uploaded!');
        document.getElementById('tool-res-title').value = '';
        document.getElementById('tool-res-file').value = '';
      } catch (e) {
        alert('Upload failed: ' + e.message);
      }
    });

    // Flatpickr for better date picker
    flatpickr("#tool-meeting-date", { enableTime: true });

    // Load initial tab
    loadTabData('schedule');

    function logout() {
      localStorage.removeItem('isop_auth');
      window.location.href = '../index.html';
    }
  </script>

  <style>
    .tab-btn { padding: 0.75rem 1.25rem; border: none; background: transparent; color: #94a3b8; border-radius: 8px; cursor: pointer; font-weight: 500; white-space: nowrap; }
    .tab-btn.active { background: rgba(45,140,255,0.2); color: #2d8cff; }
    .tab-btn:hover { background: rgba(255,255,255,0.1); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .loading { color: #94a3b8; font-style: italic; }
  </style>
</body>
</html>
