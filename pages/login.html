<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login • ISOP+</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    :root {
      --glass-bg: rgba(255,255,255,0.25);
      --glass-blur: blur(10px);
      --gradient-main: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; padding:0; min-height:100vh; background: var(--gradient-main); }
    .auth-container { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:2rem; }
    .auth-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); border-radius:24px; border:1px solid rgba(255,255,255,0.18); box-shadow:0 20px 40px rgba(0,0,0,0.15); padding:3rem; max-width:480px; width:100%; }
    .auth-header { text-align:center; margin-bottom:2rem; }
    .auth-title { font-size:2.8rem; background:linear-gradient(135deg, white, #f0f0f0); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin:0 0 0.5rem 0; font-weight:700; }
    .auth-lead { color:rgba(255,255,255,0.9); margin:0; font-size:1.05rem; }
    .tab-nav { display:flex; background:rgba(255,255,255,0.1); border-radius:16px; margin-bottom:2rem; overflow:hidden; }
    .tab-btn { flex:1; padding:0.9rem 0; border:none; background:none; color:rgba(255,255,255,0.75); font-weight:500; cursor:pointer; transition:all 0.3s; font-size:0.95rem; }
    .tab-btn.active { background:rgba(255,255,255,0.2); color:white; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .demo-grid { display:grid; gap:0.75rem; }
    .demo-btn { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.25rem; border:none; border-radius:14px; cursor:pointer; font-weight:600; font-size:1rem; transition:all 0.3s; color:white; text-align:left; }
    .demo-btn:hover { transform:translateY(-2px); filter:brightness(1.1); }
    .demo-btn.student { background:linear-gradient(135deg, #3b82f6, #2563eb); }
    .demo-btn.mentor { background:linear-gradient(135deg, #10b981, #059669); }
    .demo-btn.admin { background:linear-gradient(135deg, #f59e0b, #d97706); }
    .demo-btn .role-label { font-size:0.82rem; opacity:0.85; font-weight:400; }
    .form-group { margin-bottom:1.25rem; }
    .form-label { display:block; margin-bottom:0.5rem; color:rgba(255,255,255,0.95); font-weight:500; font-size:0.95rem; }
    .form-input { width:100%; padding:0.9rem 1.1rem; border:1px solid rgba(255,255,255,0.2); border-radius:12px; background:rgba(255,255,255,0.1); backdrop-filter:var(--glass-blur); color:white; font-size:1rem; transition:all 0.3s; box-sizing:border-box; }
    .form-input::placeholder { color:rgba(255,255,255,0.55); }
    .form-input:focus { outline:none; border-color:rgba(255,255,255,0.45); background:rgba(255,255,255,0.15); box-shadow:0 0 0 3px rgba(255,255,255,0.1); }
    .login-btn { width:100%; padding:1.1rem; border-radius:16px; border:none; font-size:1.05rem; font-weight:600; cursor:pointer; transition:all 0.3s; background:linear-gradient(135deg, #3b82f6, #2563eb); color:white; box-shadow:0 8px 25px rgba(59,130,246,0.35); margin-top:0.5rem; }
    .login-btn:hover { transform:translateY(-1px); box-shadow:0 12px 35px rgba(59,130,246,0.45); }
    .login-btn:disabled { opacity:0.7; cursor:not-allowed; transform:none; }
    .divider { text-align:center; color:rgba(255,255,255,0.6); margin:1.5rem 0; font-size:0.9rem; position:relative; }
    .divider::before, .divider::after { content:''; position:absolute; top:50%; width:40%; height:1px; background:rgba(255,255,255,0.2); }
    .divider::before { left:0; }
    .divider::after { right:0; }
    .bottom-link { text-align:center; margin-top:1.5rem; padding-top:1.5rem; border-top:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.8); font-size:0.95rem; }
    .bottom-link a { color:white; font-weight:600; text-decoration:none; }
    .bottom-link a:hover { text-decoration:underline; }
    .error-msg { background:#fee2e2; color:#dc2626; padding:0.85rem 1rem; border-radius:10px; margin-bottom:1rem; font-size:0.9rem; border:1px solid #fecaca; display:none; }
    .role-picker { display:grid; grid-template-columns:repeat(3,1fr); gap:0.5rem; margin-top:0.25rem; }
    .role-pick-btn { display:flex; flex-direction:column; align-items:center; gap:0.3rem; padding:0.75rem 0.5rem; border:2px solid rgba(255,255,255,0.15); border-radius:12px; background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.7); cursor:pointer; font-size:0.82rem; font-weight:500; transition:all 0.2s; }
    .role-pick-btn:hover { background:rgba(255,255,255,0.13); border-color:rgba(255,255,255,0.3); color:white; }
    .role-pick-btn.active { background:rgba(45,140,255,0.25); border-color:#2d8cff; color:white; font-weight:600; }
    .role-icon { font-size:1.4rem; }
    @media (max-width:600px) { .auth-card { padding:2rem 1.5rem; margin:1rem; } .auth-title { font-size:2.2rem; } }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div style="font-size:2.5rem; margin-bottom:0.5rem;">🌟</div>
        <h1 class="auth-title">ISOP+</h1>
        <p class="auth-lead">Sign in to your account</p>
        <p style="margin:0.6rem 0 0;font-size:0.72rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.5);">DISABILITY IS NOT INABILITY</p>
      </div>

      <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('demo', this)">Quick Demo</button>
        <button class="tab-btn" onclick="switchTab('email', this)">Email Login</button>
      </div>

      <!-- Demo Login Tab -->
      <div id="demo" class="tab-panel active">
        <p style="color:rgba(255,255,255,0.8); margin:0 0 1.25rem; font-size:0.95rem;">One-click login with a demo account:</p>
        <div class="demo-grid">
          <button class="demo-btn student" onclick="loginAs('student')">
            <div>
              <div>👩‍🎓 Student Dashboard</div>
              <div class="role-label">student@isop.com</div>
            </div>
            <span>→</span>
          </button>
          <button class="demo-btn mentor" onclick="loginAs('mentor')">
            <div>
              <div>👨‍🏫 Mentor Tools</div>
              <div class="role-label">mentor@isop.com</div>
            </div>
            <span>→</span>
          </button>
          <button class="demo-btn admin" onclick="loginAs('admin')">
            <div>
              <div>⚙️ Admin Panel</div>
              <div class="role-label">admin@isop.com</div>
            </div>
            <span>→</span>
          </button>
        </div>
      </div>

      <!-- Email Login Tab -->
      <div id="email" class="tab-panel">
        <div id="loginError" class="error-msg"></div>
        <form onsubmit="submitEmailLogin(event)">
          <div class="form-group">
            <label class="form-label" for="loginRole">I am signing in as</label>
            <div class="role-picker" id="rolePicker">
              <button type="button" class="role-pick-btn active" data-role="student" onclick="pickRole('student', this)">
                <span class="role-icon">👩‍🎓</span>
                <span>Student</span>
              </button>
              <button type="button" class="role-pick-btn" data-role="mentor" onclick="pickRole('mentor', this)">
                <span class="role-icon">👨‍🏫</span>
                <span>Mentor</span>
              </button>
              <button type="button" class="role-pick-btn" data-role="admin" onclick="pickRole('admin', this)">
                <span class="role-icon">⚙️</span>
                <span>Admin</span>
              </button>
            </div>
            <input type="hidden" id="loginRole" value="student" />
          </div>
          <div class="form-group">
            <label class="form-label" for="loginEmail">Email address</label>
            <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="loginPassword">Password</label>
            <input class="form-input" type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" required />
          </div>
          <button type="submit" id="loginSubmitBtn" class="login-btn">Sign In</button>
        </form>
      </div>

      <div class="bottom-link">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/localdb.js"></script>
  <script src="../assets/js/supabase.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    const DASHBOARD_MAP = { student: 'student-dashboard.html', mentor: 'mentor-tools.html', admin: 'admin.html' };

    // Redirect if already logged in
    (function() {
      try {
        const auth = JSON.parse(localStorage.getItem('isop_auth'));
        if (auth && auth.role && DASHBOARD_MAP[auth.role]) window.location.href = DASHBOARD_MAP[auth.role];
      } catch (e) {}
    })();

    function switchTab(tabName, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      btn.classList.add('active');
    }

    function pickRole(role, btn) {
      document.querySelectorAll('.role-pick-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('loginRole').value = role;
    }

    function loginAs(role) {
      const names = { student: 'Demo Student', mentor: 'Demo Mentor', admin: 'Demo Admin' };
      localStorage.setItem('isop_auth', JSON.stringify({ id: role + '_user', email: role + '@isop.com', role, name: names[role] }));
      const redirect = sessionStorage.getItem('isop_after_login_redirect');
      sessionStorage.removeItem('isop_after_login_redirect');
      window.location.href = redirect || DASHBOARD_MAP[role] || '../index.html';
    }

    async function submitEmailLogin(event) {
      event.preventDefault();
      const email        = document.getElementById('loginEmail').value.trim().toLowerCase();
      const password     = document.getElementById('loginPassword').value;
      const selectedRole = document.getElementById('loginRole').value;  // role chosen by user
      const errorDiv     = document.getElementById('loginError');
      const btn          = document.getElementById('loginSubmitBtn');

      errorDiv.style.display = 'none';
      btn.textContent = 'Signing in…';
      btn.disabled = true;

      try {
        // 1 ── Demo accounts
        const demo = {
          'student@isop.com': { pw: 'student123', role: 'student', name: 'Demo Student' },
          'mentor@isop.com':  { pw: 'mentor123',  role: 'mentor',  name: 'Demo Mentor'  },
          'admin@isop.com':   { pw: 'admin123',   role: 'admin',   name: 'Demo Admin'   }
        };
        if (demo[email] && demo[email].pw === password) {
          const d = demo[email];
          // Warn if selected role doesn't match the demo account role
          if (d.role !== selectedRole) {
            errorDiv.textContent = `This is a ${d.role} account. Switch your role selection to "${d.role}" or use the Quick Demo tab.`;
            errorDiv.style.display = 'block';
            btn.textContent = 'Sign In'; btn.disabled = false;
            return;
          }
          localStorage.setItem('isop_auth', JSON.stringify({ id: d.role + '_user', email, role: d.role, name: d.name }));
          const demoRedirect = sessionStorage.getItem('isop_after_login_redirect');
          sessionStorage.removeItem('isop_after_login_redirect');
          window.location.href = demoRedirect || DASHBOARD_MAP[d.role];
          return;
        }

        // 2 ── Supabase Auth (real registered users)
        if (window.supabaseClient) {
          const { data, error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
          if (!error && data.user) {
            // Fetch role from profiles table; fall back to what user selected
            const { data: profile } = await window.supabaseClient
              .from('profiles')
              .select('role, name')
              .eq('id', data.user.id)
              .single();

            const role = profile?.role || selectedRole;
            const name = profile?.name || data.user.email;

            // Mismatch warning: stored role vs selected role
            if (profile?.role && profile.role !== selectedRole) {
              errorDiv.textContent = `Your account is registered as a "${profile.role}". Signing you in as ${profile.role}.`;
              errorDiv.style.background = '#fef9c3';
              errorDiv.style.color = '#854d0e';
              errorDiv.style.border = '1px solid #fde68a';
              errorDiv.style.display = 'block';
              setTimeout(() => { errorDiv.style.display = 'none'; }, 4000);
            }

            const authUser = { id: data.user.id, email: data.user.email, role, name };
            localStorage.setItem('isop_auth', JSON.stringify(authUser));

            // Sync to localDB for offline access
            if (window.localDB) {
              await window.localDB.ready;
              const existing = await window.localDB.findUserByEmail(email);
              if (!existing) await window.localDB.createUser({ id: data.user.id, name, email, password: '', role });
            }

            const sbRedirect = sessionStorage.getItem('isop_after_login_redirect');
            sessionStorage.removeItem('isop_after_login_redirect');
            setTimeout(() => { window.location.href = sbRedirect || DASHBOARD_MAP[role] || '../index.html'; }, profile?.role && profile.role !== selectedRole ? 1800 : 0);
            return;
          }
          if (error && error.message !== 'Invalid login credentials') throw error;
        }

        // 3 ── LocalDB fallback (users registered without internet)
        if (window.localDB) {
          await window.localDB.ready;
          const user = await window.localDB.findUserByEmail(email);
          if (user && user.password === password) {
            // Warn if role mismatch
            if (user.role !== selectedRole) {
              errorDiv.textContent = `Your account role is "${user.role}", not "${selectedRole}". Signing you in as ${user.role}.`;
              errorDiv.style.background = '#fef9c3';
              errorDiv.style.color = '#854d0e';
              errorDiv.style.border = '1px solid #fde68a';
              errorDiv.style.display = 'block';
            }
            localStorage.setItem('isop_auth', JSON.stringify({ id: user.id, email: user.email, role: user.role, name: user.name }));
            const localRedirect = sessionStorage.getItem('isop_after_login_redirect');
            sessionStorage.removeItem('isop_after_login_redirect');
            setTimeout(() => { window.location.href = localRedirect || DASHBOARD_MAP[user.role] || '../index.html'; }, user.role !== selectedRole ? 1800 : 0);
            return;
          }
        }

        throw new Error('Invalid credentials');
      } catch (e) {
        errorDiv.style.background = '#fee2e2';
        errorDiv.style.color = '#dc2626';
        errorDiv.style.border = '1px solid #fecaca';
        errorDiv.textContent = e.message === 'Invalid credentials'
          ? 'Wrong email or password. If you just registered, check your inbox for a confirmation email first.'
          : 'Login error: ' + e.message;
        errorDiv.style.display = 'block';
      } finally {
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
