<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply • ISOP+</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>

  <header class="site-header" role="banner">
    <div class="container header-inner">
      <a class="brand" href="../index.html">
        <span class="brand__logo" aria-hidden="true">🌟</span>
        <span class="brand__name">ISOP+</span>
      </a>
      <div id="header-actions" class="header-actions"></div>
    </div>
  </header>

  <main id="main" class="site-main">
    <section class="features">
      <div class="container">
        <div class="topbar">
          <h1 id="applyTitle">Apply for Opportunity</h1>
          <p id="applyOppDesc" class="section-lead">Submit your CV and details to apply.</p>
        </div>

        <div class="feature-card" style="max-width: 600px;">
          <form id="applyForm" class="form" onsubmit="return false;">
            <input type="hidden" id="oppId" name="oppId">
            
            <label class="form-label" for="fullName">Full name</label>
            <input class="form-input" type="text" id="fullName" name="fullName" required />

            <label class="form-label" for="email">Email</label>
            <input class="form-input" type="email" id="email" name="email" required />

            <label class="form-label" for="phone">Phone (optional)</label>
            <input class="form-input" type="tel" id="phone" name="phone" />

            <label class="form-label" for="cvFile">Upload CV <span style="color: #94a3b8; font-size: 0.9rem;">(PDF, DOCX, max 5MB)</span></label>
            <input class="form-input" type="file" id="cvFile" name="cvFile" accept=".pdf,.doc,.docx" required />

            <label class="form-label" for="experience">Experience summary</label>
            <textarea class="form-input" id="experience" name="experience" rows="4" placeholder="Briefly describe your background and relevant experience" required></textarea>

            <label class="form-label" for="accessibility">Accessibility needs (optional)</label>
            <textarea class="form-input" id="accessibility" name="accessibility" rows="3" placeholder="Any accommodations we can provide?"></textarea>

            <div style="display: flex; gap: 1rem; align-items: center;">
              <button id="submitApply" class="btn btn--primary" type="submit" style="flex: 1;">Submit Application</button>
              <a id="cancelApply" href="javascript:history.back()" class="btn btn--secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/localdb.js"></script>
  <script src="../assets/js/supabase.js"></script>
  <script src="../assets/js/backend.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    // Apply page script
    const urlParams = new URLSearchParams(window.location.search);
    const oppId = urlParams.get('oppId') || 'opp-001';
    document.getElementById('oppId').value = oppId;

    // Redirect if not logged in
    const auth = JSON.parse(localStorage.getItem('isop_auth'));
    if (!auth) { window.location.href = 'login.html'; }

    // Pre-fill user info
    if (auth) {
      document.getElementById('fullName').value = auth.name || '';
      document.getElementById('email').value = auth.email || '';
    }

    // Load opportunity title/description
    const opps = JSON.parse(localStorage.getItem('isop_col_opportunities') || 'null') ||
      [{ id:'opp-001',title:'UX Design Internship',description:'Collaborate on inclusive digital products' },
       { id:'opp-002',title:'Junior Frontend Developer',description:'Build accessible web apps' },
       { id:'opp-003',title:"Women in Tech Grant",description:'Funding for tech education' },
       { id:'opp-004',title:'Accessibility Research',description:'Study assistive tech' },
       { id:'opp-005',title:'Backend Developer Internship',description:'Build scalable services' },
       { id:'opp-006',title:'Community Impact Fellowship',description:'Lead inclusive projects' },
       { id:'opp-007',title:'Data Analyst Role',description:'Analyze impact metrics' },
       { id:'opp-008',title:'Scholarship for Disabled Youth',description:'Full tuition support' }];
    const opp = opps.find(o => o.id === oppId);
    if (opp) {
      document.getElementById('applyTitle').textContent = 'Apply for: ' + opp.title;
      document.getElementById('applyOppDesc').textContent = opp.description;
    }

    function showMsg(msg, type) {
      let el = document.getElementById('applyMsg');
      if (!el) {
        el = document.createElement('div');
        el.id = 'applyMsg';
        el.style.cssText = 'padding:0.9rem 1rem;border-radius:10px;margin:1rem 0;font-size:0.9rem;';
        document.getElementById('applyForm').prepend(el);
      }
      el.textContent = msg;
      el.style.background = type === 'error' ? '#fee2e2' : '#dcfce7';
      el.style.color = type === 'error' ? '#dc2626' : '#16a34a';
      el.style.display = 'block';
    }

    document.getElementById('submitApply').addEventListener('click', async () => {
      const cvFile = document.getElementById('cvFile').files[0];
      const experience = document.getElementById('experience').value.trim();
      const accessibility = document.getElementById('accessibility').value.trim();

      if (!cvFile) { showMsg('Please upload your CV.', 'error'); return; }
      if (!experience) { showMsg('Please provide an experience summary.', 'error'); return; }

      const btn = document.getElementById('submitApply');
      btn.textContent = 'Submitting…';
      btn.disabled = true;

      try {
        // submitApplication in backend.js handles Supabase + local fallback
        await window.submitApplication(auth.id, oppId, cvFile, experience, accessibility);
        showMsg('Application submitted successfully!', 'success');
        setTimeout(() => { window.location.href = 'student-dashboard.html'; }, 1500);
      } catch (e) {
        showMsg('Submission failed: ' + e.message, 'error');
        btn.textContent = 'Submit Application';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
